{% extends "base.html" %}
{% block title %}Criar conta{% endblock %}

{% block content %}
<div class="pagina-auth">
    <div class="cartao-auth">
        <h1>Criar conta</h1>
        <p class="subtitulo">Leva menos de um minuto.</p>

        <form method="POST" action="{{ url_for('registro') }}">
            <label>Nome
                <input type="text" name="nome" value="{{ nome or '' }}" required autofocus>
            </label>
            <label>E-mail
                <input type="email" name="email" value="{{ email or '' }}" required>
            </label>
            <label>Senha
                <input type="password" name="senha" minlength="6" required>
            </label>
            <label>Confirmar senha
                <input type="password" name="confirmar_senha" minlength="6" required>
            </label>
            <button type="submit">Criar conta</button>
        </form>

        <p class="rodape-auth">Já tem conta? <a href="{{ url_for('login') }}">Entrar</a></p>
    </div>
</div>
{% endblock %}
